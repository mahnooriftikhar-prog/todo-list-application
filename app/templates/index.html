<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>

<h2>Todo List</h2>

<form action="/add" method="POST">
    <input type="text" name="task">
    <button type="submit">Add</button>
</form>

<ul>
{% for task in tasks %}
<li>
    {{ task }}
    <a href="/delete/{{ loop.index0 }}">Delete</a>
</li>
{% endfor %}
</ul>

</body>
</html>
